<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Interativo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
</head>
<body>
    <div class="form-card">
        <div class="form-header">
            <h1>Formulário Interativo</h1>
        </div>

        <div class="form-body">
            <div class="input-group">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" class="campo" placeholder="Insira seu nome completo">
                <div id="erroNome" class="erro-msg"></div>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="campo" placeholder="seuemail@exemplo.com">
                <div id="erroEmail" class="erro-msg"></div>
            </div>

            <button class="btn-enviar" id="botaoEnviar">Enviar formulário</button>

            <div id="feedbackGlobal" class="feedback-global"></div>
        </div>

        <div class="form-footer">
            <span>By Felipe Nascimento</span>
        </div>
    </div>

    <script src="poo.js"></script>
</body>
</html>
